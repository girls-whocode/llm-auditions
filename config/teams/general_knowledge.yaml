# General Knowledge team configuration
# 18–24 tasks across separate roles

team: general_knowledge
description: "General knowledge — fast worker, heavy worker, and reviewer roles."

roles:
  - id: fast_worker
    description: "Quick accurate answers; correct escalation recognition; restraint"
    candidates:
      - gemma4:12b
      - qwen3.5:9b
      - qwen2.5:14b-instruct
      - phi4:14b
    scoring_weights:
      contract_score: 0.15
      correctness_score: 0.35
      escalation_score: 0.20
      instruction_score: 0.15
      latency_score: 0.15

  - id: heavy_worker
    description: "Difficult reasoning; material improvement over fast-worker baseline"
    candidates:
      - gemma4:26b
      - phi4-reasoning:14b
      - phi4:14b
      - gemma4:12b   # baseline comparison
    scoring_weights:
      contract_score: 0.10
      correctness_score: 0.40
      completeness_score: 0.25
      escalation_score: 0.15
      latency_score: 0.10

  - id: reviewer
    description: "Approves, revises, rejects, reroutes, or requests research"
    candidates:
      - qwen3.5:9b
      - gemma4:12b
      - qwen2.5:14b-instruct
    scoring_weights:
      contract_score: 0.15
      correctness_score: 0.30
      escalation_score: 0.30
      instruction_score: 0.25

escalation_measurement:
  enabled: true
  fast_worker_candidates:
    - gemma4:12b
    - qwen3.5:9b
  heavy_worker_candidates:
    - gemma4:26b
    - phi4-reasoning:14b
