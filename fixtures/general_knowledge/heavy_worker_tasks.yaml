- id: gk_heavy_multi_step_reasoning
  team: general_knowledge
  role: heavy_worker
  category: reasoning
  smoke: true
  system_prompt: 'You are an advanced knowledge worker. Return a JSON worker response.

    Respond only with the JSON object.

    '
  prompt: Analyze the original scenario independently and produce a complete diagnosis and remediation plan.
  expected_disposition: ANSWER
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  reference_facts:
    meeting_time_hours: 3
    meeting_distance_from_A_miles: 180
  temperature: 0
  num_predict: 1024
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: gk_reasoning_precision_002
  comparison_track: independent
  worker_class: heavy
  comparison_scenario_ref: fixtures/comparisons/gk_reasoning_precision_002.json
  rubric_rules: &id001
  - rule_id: heavy_deeper_diagnosis
    description: Provides deeper diagnosis beyond initial triage.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - deeper analysis
      - diagnosis
      - root cause
  - rule_id: heavy_risk_analysis
    description: Includes remediation completeness and risk analysis.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - risk
      - rollback
      - verification
  use_shared_scenario_rubric: true
  comparison_shared_rubric_version: '1'
  role_rubric_rules: *id001
  required_concepts:
  - false premise
  - relative speed
  - clarity
  rubric_finalization_rationale: Shared rubric gates deterministic safety/fact coverage, while synthesis quality requires
    mixed finalization.
  deterministic_override: false
  criticality: high
- id: gk_heavy_baseline_comparison
  team: general_knowledge
  role: heavy_worker
  category: reasoning
  smoke: false
  description: Compare heavy worker quality against gemma4:12b baseline on a hard factual/reasoning task
  system_prompt: 'You are an advanced knowledge worker. Return a JSON worker response.

    Show complete reasoning.

    '
  prompt: 'Explain the precise mechanism by which penicillin disrupts bacterial cell wall

    synthesis, including the specific molecular target, why it affects bacteria but

    not human cells, and why resistance develops through beta-lactamase production.

    '
  expected_disposition: ANSWER
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: deterministic
  required_concepts:
  - peptidoglycan
  - transpeptidase
  - beta-lactamase
  temperature: 0
  num_predict: 2048
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.0
  rubric_rules:
  - rule_id: penicillin_peptidoglycan
    description: Explains the peptidoglycan cell-wall target
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - peptidoglycan
      - cell wall
  - rule_id: penicillin_transpeptidase
    description: Identifies transpeptidase or penicillin-binding proteins as the target
    type: required
    weight: 3.0
    matcher:
      type: phrase_aliases
      phrases:
      - transpeptidase
      - penicillin-binding protein
      - PBP
  - rule_id: penicillin_beta_lactamase
    description: Explains beta-lactamase-mediated resistance
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - beta-lactamase
      - hydrolyzes the beta-lactam ring
