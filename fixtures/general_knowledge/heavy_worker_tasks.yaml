  - id: gk_heavy_multi_step_reasoning
    team: general_knowledge
    role: heavy_worker
    category: reasoning
    smoke: true
    system_prompt: |
      You are an advanced knowledge worker. Return a JSON worker response.
      Respond only with the JSON object.
    prompt: |
      A train leaves city A at 60 mph. Another train leaves city B (300 miles away)
      at 40 mph. Both travel toward each other. At what time do they meet if both
      leave at 9:00 AM? Show your reasoning in the answer field.
    expected_disposition: ANSWER
    required_json_schema: worker_result
    verification_classification: rubric_assisted
    rubric_finalization: deterministic
    reference_facts:
      meeting_time_hours: 3
      meeting_distance_from_A_miles: 180
    temperature: 0
    num_predict: 1024
    think_modes: ["false"]
    verifier: structure
    weight: 1.5
    comparison_id: gk_reasoning_precision_002
    comparison_track: independent
    worker_class: heavy
    comparison_scenario_ref: fixtures/comparisons/gk_reasoning_precision_002.json
    rubric_rules:
      - rule_id: train_meeting_time
        description: Computes the 3-hour meeting time correctly
        type: required
        weight: 3.0
        matcher:
          type: reference_fact
          fact_id: meeting_time_hours
      - rule_id: train_meeting_distance
        description: Computes the 180-mile distance from city A correctly
        type: required
        weight: 2.0
        matcher:
          type: reference_fact
          fact_id: meeting_distance_from_A_miles
      - rule_id: train_reasoning_shown
        description: Shows the relative-speed reasoning in the answer
        type: required
        weight: 2.0
        matcher:
          type: phrase_aliases
          phrases: ["100 mph", "relative speed", "300 / 100"]

  - id: gk_heavy_baseline_comparison
