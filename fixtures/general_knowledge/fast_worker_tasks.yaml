- id: gk_fast_restraint_concise
  team: general_knowledge
  role: fast_worker
  category: instruction_following
  smoke: false
  description: Fast worker must not over-answer a simple factual question
  system_prompt: 'You are a fast-response knowledge worker. Be concise. Return a JSON worker response.

    '
  prompt: What is the boiling point of water at sea level in Celsius?
  expected_disposition: ANSWER
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: deterministic
  temperature: 0
  num_predict: 256
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.0
  rubric_rules:
  - rule_id: boiling_point_answer_disposition
    description: Uses ANSWER for the routine factual question
    type: required
    weight: 1.0
    matcher:
      type: disposition
      value: ANSWER
  - rule_id: boiling_point_correct_value
    description: Gives 100 C as the boiling point at sea level
