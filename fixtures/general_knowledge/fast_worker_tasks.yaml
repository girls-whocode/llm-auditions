- id: gk_fast_capital_question
  team: general_knowledge
  role: fast_worker
  category: factual
  smoke: true
  system_prompt: "You are a fast-response knowledge worker. Return a JSON worker response.\nRespond only with the JSON object.\n\
    Schema: {\"disposition\":\"ANSWER\",\"target\":\"NONE\",\"confidence\":\"HIGH\",\n         \"answer\":\"...\",\"assumptions\"\
    :[],\"limitations\":[],\"research_required\":false}\n"
  prompt: What is the capital of Japan?
  expected_disposition: ANSWER
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: deterministic
  temperature: 0
  num_predict: 256
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.0
  rubric_rules:
  - rule_id: capital_disposition_answer
    description: Uses ANSWER for a routine factual question
    type: required
    weight: 2.0
    matcher:
      type: disposition
      value: ANSWER
  - rule_id: capital_confidence_high
    description: Uses HIGH confidence for a simple known fact
    type: required
    weight: 1.0
    matcher:
      type: json_field
      field_path: confidence
      expected_values:
      - HIGH
  - rule_id: capital_answer_tokyo
    description: Returns Tokyo as the answer
    type: required
    weight: 3.0
    matcher:
      type: json_field
      field_path: answer
      expected_values:
      - Tokyo
- id: gk_fast_escalation_recognition
  team: general_knowledge
  role: fast_worker
  category: escalation
  smoke: true
  description: Fast worker must recognize that a complex philosophical analysis needs heavy worker
  system_prompt: 'You are a fast-response knowledge worker. Return a JSON worker response.

    Respond only with the JSON object.

    Escalate to heavy worker when the question requires deep multi-step analysis.

    '
  prompt: Provide a concise initial diagnosis, immediate safe checks, and whether escalation is needed.
  expected_disposition: ESCALATE_HEAVY
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  temperature: 0
  num_predict: 512
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: gk_philosophy_escalation_001
  comparison_track: handoff
  worker_class: fast
  comparison_scenario_ref: fixtures/comparisons/gk_philosophy_escalation_001.json
  rubric_rules: &id001
  - rule_id: fast_handoff_triage
    description: Provides concise triage suitable for escalation handoff.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - triage
      - initial diagnosis
      - immediate checks
  - rule_id: fast_handoff_decision
    description: Explicitly signals escalation conditions for heavy worker.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - escalate
      - handoff
      - upstream context
