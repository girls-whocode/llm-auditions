  role: reviewer
  category: reviewer_quality
  smoke: false
  description: Reviewer must request revision on an incomplete but partially correct answer
  system_prompt: 'You are a reviewer. Return a JSON reviewer response.

    Request revisions for answers that are incomplete.

    '
