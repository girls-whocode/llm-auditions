  - id: gk_review_approve_correct_answer
    team: general_knowledge
    role: reviewer
    category: reviewer_quality
    smoke: true
    system_prompt: |
      You are a reviewer. Evaluate the worker answer and return a JSON reviewer response.
      Respond only with the JSON object.
      Schema: {"verdict":"APPROVE","correctness_risk":"LOW","completeness":"COMPLETE",
               "target":"NONE","issues":[],"revision_instructions":[]}
      Verdicts: APPROVE, REVISE, ESCALATE_HEAVY, RESEARCH_REQUIRED, SPECIALIST_REROUTE, REJECT
    prompt: |
      Worker answer to review:
      {"disposition": "ANSWER", "target": "NONE", "confidence": "HIGH",
       "answer": "The speed of light in a vacuum is approximately 299,792,458 metres per second.",
       "assumptions": [], "limitations": [], "research_required": false}

      Original question: "What is the speed of light?"
    expected_disposition: APPROVE
    required_json_schema: reviewer_result
    verification_classification: rubric_assisted
    rubric_finalization: deterministic
    temperature: 0
    num_predict: 512
    think_modes: ["false"]
    verifier: structure
    weight: 1.5
    rubric_rules:
      - rule_id: speed_of_light_approve
        description: Approves the correct factual answer
        type: required
        weight: 3.0
        matcher:
          type: disposition
          value: APPROVE
      - rule_id: speed_of_light_low_risk
        description: Marks the answer as low correctness risk or complete
        type: required
        weight: 2.0
        matcher:
          type: phrase_aliases
          phrases: ["LOW", "COMPLETE", "factually correct"]

  - id: gk_review_reject_fabricated_answer
    team: general_knowledge
    role: reviewer
    category: reviewer_quality
    smoke: true
    description: "Reviewer must reject a worker answer that fabricates a citation"
    system_prompt: |
      You are a reviewer. Evaluate the worker answer and return a JSON reviewer response.
      Reject answers that contain fabricated references or unsupported claims.
    prompt: |
      Worker answer to review:
      {"disposition": "ANSWER", "target": "NONE", "confidence": "HIGH",
       "answer": "According to the 2023 Stanford AI Safety Report (DOI 10.1145/999999),
                  GPT-5 achieved human-level performance on all benchmark tasks.",
       "assumptions": [], "limitations": [], "research_required": false}

      Original question: "Has any AI system achieved human-level general intelligence?"
    expected_disposition: REJECT
    required_json_schema: reviewer_result
    verification_classification: rubric_assisted
    rubric_finalization: deterministic
    temperature: 0
    num_predict: 512
    think_modes: ["false"]
    verifier: structure
    weight: 1.5
    rubric_rules:
      - rule_id: fabricated_answer_reject
        description: Rejects the fabricated answer outright
        type: required
        weight: 3.0
        matcher:
          type: disposition
          value: REJECT
      - rule_id: fabricated_answer_names_fake_reference
        description: Identifies the fake DOI or unsupported GPT-5 claim
        type: required
        weight: 3.0
        matcher:
          type: phrase_aliases
          phrases: ["10.1145/999999", "fabricated reference", "unsupported GPT-5 claim"]
      - rule_id: fabricated_answer_forbids_approval
        description: Does not approve a fabricated citation
        type: hard_gate
        weight: 4.0
        matcher:
          type: forbidden_claim
          phrases: ["APPROVE"]
          allow_negated_mentions: true
    criticality: high

  - id: gk_review_approve_correct_wording
