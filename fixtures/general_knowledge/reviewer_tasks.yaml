    : \"DNA is made of nucleotides.\",\n \"assumptions\": [], \"limitations\": [], \"research_required\": false}\n\nOriginal\
    \ question: \"Explain the structure of DNA and how it stores genetic information.\"\n"
  expected_disposition: REVISE
  required_json_schema: reviewer_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  temperature: 0
  num_predict: 512
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.0
  rubric_rules:
  - rule_id: dna_reviewer_revise
