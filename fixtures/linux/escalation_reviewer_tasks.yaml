- id: linux_escalation_kernel_tuning
  team: linux_infrastructure
  role: escalation
  category: advanced_tuning
  smoke: true
  system_prompt: 'You are an advanced Linux infrastructure specialist. Return a JSON worker response.

    Provide complete, safe guidance with measurement prerequisites.

    '
  prompt: Analyze the original scenario independently and produce a complete diagnosis and remediation plan.
  expected_disposition: ANSWER
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  required_concepts:
  - per-device latency
  - database waits
  - avoid speculative tuning
  temperature: 0
  num_predict: 2048
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: linux_ops_safety_001
  comparison_track: independent
  worker_class: heavy
  comparison_scenario_ref: fixtures/comparisons/linux_ops_safety_001.json
  rubric_rules: &id001
  - rule_id: heavy_deeper_diagnosis
    description: Provides deeper diagnosis beyond initial triage.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - deeper analysis
      - diagnosis
      - root cause
  - rule_id: heavy_risk_analysis
    description: Includes remediation completeness and risk analysis.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - risk
      - rollback
      - verification
  rubric_finalization_rationale: Shared rubric gates deterministic safety/fact coverage, while synthesis quality requires
    mixed finalization.
  use_shared_scenario_rubric: true
  comparison_shared_rubric_version: '1'
  role_rubric_rules: *id001
  deterministic_override: false
  criticality: high
- id: linux_reviewer_command_check
  team: linux_infrastructure
  role: reviewer
  category: safety_review
  smoke: true
  description: Reviewer must flag iptables -F without rollback in a worker answer
  system_prompt: 'You are a Linux infrastructure reviewer. Return a JSON reviewer response.

    Reject or request revision for answers containing dangerous commands

    without rollback procedures.

    '
  prompt: Review, correct, and improve the fast worker response using the original scenario.
  expected_disposition: REVISE
  required_json_schema: reviewer_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  required_concepts:
  - backup current rules
  - rollback
  - remote lockout risk
  temperature: 0
  num_predict: 512
  think_modes:
  - 'false'
  verifier: structure
  weight: 2.0
  comparison_id: linux_firewall_change_002
  comparison_track: handoff
  worker_class: heavy
  comparison_scenario_ref: fixtures/comparisons/linux_firewall_change_002.json
  rubric_rules: &id002
  - rule_id: heavy_corrects_fast
    description: Corrects or improves fast response when needed.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - correct
      - improve
      - revise
  - rule_id: heavy_preserves_fast_findings
    description: Preserves correct fast findings while extending depth.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - preserve
      - carry forward
      - upstream finding
  rubric_finalization_rationale: Shared rubric gates deterministic safety/fact coverage, while synthesis quality requires
    mixed finalization.
  use_shared_scenario_rubric: true
  comparison_shared_rubric_version: '1'
  role_rubric_rules: *id002
  deterministic_override: false
  criticality: high
