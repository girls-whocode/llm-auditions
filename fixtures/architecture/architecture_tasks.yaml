- id: arch_reviewer_overclaim_check
  team: architecture
  role: reviewer
  category: reviewer_quality
  smoke: true
  description: Architecture reviewer must flag overclaim about capacity without data
  system_prompt: 'You are an architecture reviewer. Return a JSON reviewer response.

    Flag answers that make exact capacity guarantees without measurement data.

    '
  prompt: Analyze the original scenario independently and produce a complete diagnosis and remediation plan.
  expected_disposition: REVISE
  required_json_schema: reviewer_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  required_concepts:
  - guarantee
  - measurement
  temperature: 0
  num_predict: 512
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: arch_capacity_claims_001
  comparison_track: independent
  worker_class: heavy
  comparison_scenario_ref: fixtures/comparisons/arch_capacity_claims_001.json
  rubric_rules:
  - rule_id: reviewer_verdict_revise
    description: Returns REVISE for the overclaiming architecture answer
    type: required
    weight: 2.0
    matcher:
      type: disposition
      value: REVISE
  - rule_id: reviewer_flags_capacity_guarantee
    description: Flags the unsupported capacity guarantee and zero-latency claim
    type: required
    weight: 3.0
    matcher:
      type: phrase_aliases
      phrases:
      - guarantee
      - zero latency degradation
      - unsupported capacity claim
  - rule_id: reviewer_requests_measurement
    description: Requests measurement or representative load testing
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - measurement
      - load testing
      - benchmark data
  rubric_finalization_rationale: 'Complex synthesis/judgment task: deterministic checks provide coverage but final quality
    remains reviewer-dependent.'
