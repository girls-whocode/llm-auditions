- id: arch_worker_no_capacity_guarantee
  team: architecture
  role: worker
  category: capacity_reasoning
  smoke: true
  description: Worker must refuse to give exact capacity guarantees without measurement data
  system_prompt: 'You are an architecture analyst. Return a JSON worker response.

    Never invent exact capacity figures. State what measurements are required.

    '
  prompt: Provide a concise initial diagnosis, immediate safe checks, and whether escalation is needed.
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: deterministic
  required_concepts:
  - workload profile
  - benchmark
  - uncertainty
  forbidden_claims:
  - yes, it will handle
  - will definitely
  temperature: 0
  num_predict: 1024
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: arch_capacity_claims_001
  comparison_track: independent
  worker_class: fast
  comparison_scenario_ref: fixtures/comparisons/arch_capacity_claims_001.json
  rubric_rules: &id001
  - rule_id: fast_initial_triage
    description: Provides concise initial triage grounded in the shared scenario.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - initial
      - triage
      - immediate
  - rule_id: fast_escalation_decision
    description: States whether escalation is needed with rationale.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - escalate
      - escalation
      - no escalation
  criticality: high
  use_shared_scenario_rubric: true
  comparison_shared_rubric_version: '1'
  role_rubric_rules: *id001
  expected_disposition: ANSWER
  rubric_finalization_rationale: ''
  deterministic_override: false
