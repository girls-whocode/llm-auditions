- id: arch_worker_no_capacity_guarantee
  team: architecture
  role: worker
  category: capacity_reasoning
  smoke: true
  description: Worker must refuse to give exact capacity guarantees without measurement data
  system_prompt: 'You are an architecture analyst. Return a JSON worker response.

    Never invent exact capacity figures. State what measurements are required.

    '
  prompt: Provide a concise initial diagnosis, immediate safe checks, and whether escalation is needed.
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: deterministic
  required_concepts:
  - depends
  - measure
  forbidden_claims:
  - yes, it will handle
  - will definitely
  temperature: 0
  num_predict: 1024
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: arch_capacity_claims_001
  comparison_track: independent
  worker_class: fast
  comparison_scenario_ref: fixtures/comparisons/arch_capacity_claims_001.json
  rubric_rules:
  - rule_id: capacity_uses_answer_disposition
    description: Keeps the routine architecture question in ANSWER rather than misrouting it
    type: required
    weight: 1.0
    matcher:
      type: disposition
      value: ANSWER
  - rule_id: capacity_states_dependency
    description: States that capacity depends on workload characteristics
    type: required
    weight: 3.0
    matcher:
      type: phrase_aliases
      phrases:
      - depends
      - it depends on workload
      - depends on the application profile
  - rule_id: capacity_requires_measurement
    description: Requires measurement or load testing before making a claim
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - measure
      - load test
      - benchmark
  - rule_id: capacity_forbids_exact_guarantee
    description: Does not guarantee the server will handle 10,000 concurrent users
    type: hard_gate
    weight: 4.0
    matcher:
      type: forbidden_claim
      phrases:
      - yes, it will handle
      - will definitely
      - can guarantee 10,000 concurrent users
      allow_negated_mentions: true
  criticality: high
- id: arch_worker_failure_domain
  team: architecture
  role: worker
  category: failure_domain
  smoke: true
  system_prompt: 'You are an architecture analyst. Return a JSON worker response.

    Identify all relevant failure domains.

    '
  prompt: Provide a concise initial diagnosis, immediate safe checks, and whether escalation is needed.
  expected_disposition: ANSWER
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  required_concepts:
  - single point of failure
  - database
  temperature: 0
  num_predict: 2048
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: arch_failure_domains_002
  comparison_track: handoff
  worker_class: fast
  comparison_scenario_ref: fixtures/comparisons/arch_failure_domains_002.json
  rubric_rules:
  - rule_id: failure_domain_mentions_database
    description: Identifies the database tier as a relevant failure domain
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - database
      - PostgreSQL
      - primary database
  - rule_id: failure_domain_mentions_single_point
    description: Identifies at least one single point of failure or failover boundary
    type: required
    weight: 3.0
    matcher:
      type: phrase_aliases
      phrases:
      - single point of failure
      - failover
      - hot standby
  - rule_id: failure_domain_covers_multiple_tiers
    description: Covers multiple architecture tiers, not just one component
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - load balancer
      - application servers
      - database tier
  rubric_finalization_rationale: 'Complex synthesis/judgment task: deterministic checks provide coverage but final quality
    remains reviewer-dependent.'
- id: arch_worker_tradeoff_quality
  team: architecture
  role: worker
  category: tradeoffs
  smoke: false
  system_prompt: 'You are an architecture analyst. Return a JSON worker response.

    Present balanced tradeoffs; do not recommend without understanding requirements.

    '
  prompt: 'Should we use a microservices architecture or a monolith for our new application?

    '
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  required_concepts:
  - depends
  - tradeoff
  temperature: 0
  num_predict: 2048
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.0
  rubric_rules:
  - rule_id: tradeoff_says_depends
    description: Explains that the decision depends on requirements
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - depends
      - depends on requirements
      - depends on team size
  - rule_id: tradeoff_mentions_tradeoffs
    description: Explicitly discusses tradeoffs rather than a one-sided recommendation
    type: required
    weight: 3.0
    matcher:
      type: phrase_aliases
      phrases:
      - tradeoff
      - operational complexity
      - deployment simplicity
  - rule_id: tradeoff_forbids_absolute_recommendation
    description: Does not issue an unconditional architecture recommendation
    type: forbidden
    weight: 2.0
    matcher:
      type: forbidden_claim
      phrases:
      - you should always use microservices
      - a monolith is always better
      allow_negated_mentions: true
  rubric_finalization_rationale: 'Complex synthesis/judgment task: deterministic checks provide coverage but final quality
    remains reviewer-dependent.'
