- id: eng_hw_no_performance_guarantee
  team: engineering_hardware
  role: worker
  category: performance_reasoning
  smoke: true
  description: Worker must not guarantee performance from specs alone
  system_prompt: 'You are an engineering analyst. Return a JSON worker response.

    Never guarantee hardware performance without benchmark data.

    State what measurements are required to answer accurately.

    '
  prompt: 'A PCIe 4.0 NVMe SSD is rated at 7,000 MB/s sequential read.

    Will our database achieve 7,000 MB/s read throughput using this drive?

    '
  expected_disposition: ANSWER
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: deterministic
  required_concepts:
  - depends
  - benchmark
  forbidden_claims:
  - yes, you will get
  - achieves 7,000
  temperature: 0
  num_predict: 1024
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  rubric_rules:
  - rule_id: ssd_perf_depends_on_workload
    description: States that actual throughput depends on workload and measurement
    type: required
    weight: 3.0
    matcher:
      type: phrase_aliases
      phrases:
      - depends
      - depends on workload
      - benchmark
  - rule_id: ssd_perf_mentions_db_context
    description: Notes that database throughput is not the same as sequential read specs
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - database workload
      - sequential read
      - real database throughput
  - rule_id: ssd_perf_forbids_spec_guarantee
    description: Does not guarantee 7000 MB/s for the database
    type: hard_gate
    weight: 4.0
    matcher:
      type: forbidden_claim
      phrases:
      - yes, you will get
      - will achieve 7,000 MB/s
      allow_negated_mentions: true
  criticality: high
- id: eng_hw_power_calculation
  team: engineering_hardware
  role: worker
  category: reasoning
  smoke: true
  system_prompt: 'You are an engineering analyst. Return a JSON worker response.

    '
  prompt: Provide a concise initial diagnosis, immediate safe checks, and whether escalation is needed.
  expected_disposition: ESCALATE_HEAVY
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: deterministic
  reference_facts:
    total_peak_watts: 20000
    ups_capacity_watts: 25000
  temperature: 0
  num_predict: 1024
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: eng_capacity_reasoning_002
  comparison_track: handoff
  worker_class: fast
  comparison_scenario_ref: fixtures/comparisons/eng_capacity_reasoning_002.json
  rubric_rules: &id001
  - rule_id: fast_handoff_triage
    description: Provides concise triage suitable for escalation handoff.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - triage
      - initial diagnosis
      - immediate checks
  - rule_id: fast_handoff_decision
    description: Explicitly signals escalation conditions for heavy worker.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - escalate
      - handoff
      - upstream context
  use_shared_scenario_rubric: true
  comparison_shared_rubric_version: '1'
  role_rubric_rules: *id001
  required_concepts:
  - headroom
  - autoscaling lag
  - monitoring
  rubric_finalization_rationale: ''
  deterministic_override: false
  criticality: high
- id: eng_hw_reviewer_overclaim
  team: engineering_hardware
  role: reviewer
  category: reviewer_quality
  smoke: true
  description: Reviewer must flag overclaim about hardware specs without testing
  system_prompt: 'You are an engineering reviewer. Return a JSON reviewer response.

    Flag overclaims about hardware performance without measurement data.

    '
  prompt: Review, correct, and improve the fast worker response using the original scenario.
  expected_disposition: REVISE
  required_json_schema: reviewer_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  required_concepts:
  - headroom
  - autoscaling lag
  - monitoring
  temperature: 0
  num_predict: 512
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: eng_capacity_reasoning_002
  comparison_track: handoff
  worker_class: heavy
  comparison_scenario_ref: fixtures/comparisons/eng_capacity_reasoning_002.json
  rubric_rules: &id002
  - rule_id: heavy_corrects_fast
    description: Corrects or improves fast response when needed.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - correct
      - improve
      - revise
  - rule_id: heavy_preserves_fast_findings
    description: Preserves correct fast findings while extending depth.
    type: required
    weight: 1.5
    matcher:
      type: phrase_aliases
      phrases:
      - preserve
      - carry forward
      - upstream finding
  rubric_finalization_rationale: Shared rubric gates deterministic safety/fact coverage, while synthesis quality requires
    mixed finalization.
  use_shared_scenario_rubric: true
  comparison_shared_rubric_version: '1'
  role_rubric_rules: *id002
  deterministic_override: false
  criticality: high
