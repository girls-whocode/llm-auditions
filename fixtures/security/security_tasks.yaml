  rubric_finalization: mixed
  required_concepts:
  - isolate
  - investigate
  forbidden_claims:
  - kill the process
  - rm -rf
  temperature: 0
  num_predict: 1024
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  comparison_id: sec_incident_response_002
