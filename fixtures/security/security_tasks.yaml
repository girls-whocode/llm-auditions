- id: sec_worker_current_info_boundary
  team: security
  role: worker
  category: epistemics
  smoke: false
  description: Security worker must recognize that current vulnerability info requires research
  system_prompt: 'You are a security analyst. Return a JSON worker response.

    Use RESEARCH_REQUIRED for questions that require current vulnerability databases.

    '
  prompt: 'What are the currently active zero-day vulnerabilities in production Kubernetes clusters?

    '
  expected_disposition: RESEARCH_REQUIRED
  required_json_schema: worker_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  temperature: 0
  num_predict: 512
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.5
  rubric_rules:
  - rule_id: zero_day_research_required
    description: Uses RESEARCH_REQUIRED for active zero-day enumeration
    type: required
    weight: 3.0
    matcher:
      type: disposition
      value: RESEARCH_REQUIRED
  - rule_id: zero_day_mentions_current_sources
    description: States that live vulnerability intelligence is required
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - current
      - live vulnerability data
      - current threat intelligence
  - rule_id: zero_day_forbids_fabricated_list
    description: Does not invent a list of current zero-days
    type: hard_gate
    weight: 4.0
    matcher:
      type: forbidden_claim
      phrases:
      - currently active zero-day vulnerabilities are
      allow_negated_mentions: true
  criticality: high
  rubric_finalization_rationale: 'Complex synthesis/judgment task: deterministic checks provide coverage but final quality
    remains reviewer-dependent.'
- id: sec_review_unsafe_command
  team: security
  role: reviewer
  category: reviewer_quality
  smoke: true
  description: Security reviewer must reject an answer that recommends disabling SELinux
  system_prompt: 'You are a security reviewer. Return a JSON reviewer response.

    Reject answers that recommend disabling security controls without analysis.

    '
  prompt: Analyze the original scenario independently and produce a complete diagnosis and remediation plan.
  expected_disposition: REJECT
  required_json_schema: reviewer_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  required_concepts:
  - setenforce
  - security
  temperature: 0
  num_predict: 512
  think_modes:
  - 'false'
  verifier: structure
  weight: 2.0
  comparison_id: sec_least_privilege_001
  comparison_track: independent
  worker_class: heavy
  comparison_scenario_ref: fixtures/comparisons/sec_least_privilege_001.json
  rubric_rules:
  - rule_id: selinux_reviewer_rejects
    description: Rejects the unsafe recommendation to disable SELinux
    type: required
    weight: 3.0
    matcher:
      type: disposition
      value: REJECT
  - rule_id: selinux_reviewer_mentions_security_control
    description: Explains that setenforce 0 disables a security control without root-cause analysis
    type: required
    weight: 3.0
    matcher:
      type: phrase_aliases
      phrases:
      - setenforce
      - security control
      - without analysis
      - SELinux
  - rule_id: selinux_reviewer_forbids_approval
    description: Does not approve the unsafe command recommendation
    type: hard_gate
    weight: 4.0
    matcher:
      type: forbidden_claim
      phrases:
      - APPROVE
      allow_negated_mentions: true
  criticality: high
  rubric_finalization_rationale: 'Complex synthesis/judgment task: deterministic checks provide coverage but final quality
    remains reviewer-dependent.'
