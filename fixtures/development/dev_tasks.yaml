- id: dev_fast_subtle_bug
  team: development
  role: fast_worker
  category: debugging
  smoke: false
  edge_case: false
  description: Model must identify a subtle off-by-one bug in Python code
  system_prompt: 'You are a Python developer. Identify and fix bugs in the provided code.

    Return corrected code in a python block followed by explanation.

    '
  prompt: "Find and fix the bug(s) in this Python function:\n\n```python\ndef find_max_subarray_sum(nums: list[int]) -> int:\n\
    \    \"\"\"Return the maximum sum of any contiguous subarray.\"\"\"\n    max_sum = 0\n    current_sum = 0\n    for num\
    \ in nums:\n        current_sum = current_sum + num\n        if current_sum > max_sum:\n            max_sum = current_sum\n\
    \        if current_sum < 0:\n            current_sum = 0\n    return max_sum\n```\n\nTest case: find_max_subarray_sum([-2,\
    \ -3, -1]) should return -1, not 0.\n"
  verifier: development
  verification_classification: deterministic
  hard_gate: true
  development:
    language: python
    entry_file: solution.py
    test_command:
    - python
    - -m
    - pytest
    - -q
    fixture_directory: fixtures/development/task_004
    timeout_seconds: 20
  reference_facts:
    bug: Initializing max_sum to 0 fails for all-negative arrays
  temperature: 0
  num_predict: 1024
  think_modes:
  - 'false'
  weight: 1.5
