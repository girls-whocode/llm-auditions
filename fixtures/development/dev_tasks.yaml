- id: dev_code_review_security_flaw
  team: development
  role: code_review
  category: security_review
  smoke: true
  description: Reviewer must identify SQL injection vulnerability
  system_prompt: 'You are a code reviewer. Review the code for correctness, security, and style.

    Return a JSON reviewer response.

    '
  prompt: Review, correct, and improve the fast worker response using the original scenario.
  expected_disposition: REJECT
  required_json_schema: reviewer_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  required_concepts:
  - SQL injection
  - parameterized
  temperature: 0
  num_predict: 1024
  think_modes:
  - 'false'
  verifier: structure
  weight: 2.0
  comparison_id: dev_scripting_reliability_002
  comparison_track: handoff
  worker_class: heavy
  comparison_scenario_ref: fixtures/comparisons/dev_scripting_reliability_002.json
  rubric_rules:
  - rule_id: sqli_reviewer_rejects
    description: Rejects the vulnerable SQL construction
    type: required
    weight: 3.0
    matcher:
      type: disposition
      value: REJECT
  - rule_id: sqli_reviewer_names_vulnerability
    description: Identifies SQL injection explicitly
    type: required
    weight: 3.0
    matcher:
      type: phrase_aliases
      phrases:
      - SQL injection
      - string interpolation in SQL
      - unsafe query construction
  - rule_id: sqli_reviewer_requires_parameterization
    description: Recommends parameterized queries or prepared statements
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - parameterized
      - prepared statement
      - bound parameter
  rubric_finalization_rationale: 'Complex synthesis/judgment task: deterministic checks provide coverage but final quality
    remains reviewer-dependent.'
- id: dev_code_review_approve_correct
  team: development
  role: code_review
  category: reviewer_quality
  smoke: false
  description: Reviewer must approve correct code even if style differs from preference
  system_prompt: 'You are a code reviewer. Return a JSON reviewer response.

    Approve functionally correct code even if you prefer different style.

    '
  prompt: "Review this Python function:\n\n```python\ndef is_palindrome(s):\n    s = s.lower().replace(' ', '')\n    return\
    \ s == s[::-1]\n```\n\nOriginal task: \"Check if a string is a palindrome, ignoring case and spaces.\"\n"
  expected_disposition: APPROVE
  required_json_schema: reviewer_result
  verification_classification: rubric_assisted
  rubric_finalization: mixed
  temperature: 0
  num_predict: 512
  think_modes:
  - 'false'
  verifier: structure
  weight: 1.0
  rubric_rules:
  - rule_id: palindrome_reviewer_approves
    description: Approves the functionally correct implementation
    type: required
    weight: 3.0
    matcher:
      type: disposition
      value: APPROVE
  - rule_id: palindrome_reviewer_accepts_style_variance
    description: Accepts different coding style when logic is correct
    type: required
    weight: 2.0
    matcher:
      type: phrase_aliases
      phrases:
      - functionally correct
      - style preference
      - correct despite style
  - rule_id: palindrome_reviewer_forbids_style_rejection
    description: Does not reject the answer purely on style preference
    type: forbidden
    weight: 2.0
    matcher:
      type: forbidden_claim
      phrases:
      - reject because
      - must be rewritten for style
      allow_negated_mentions: true
  rubric_finalization_rationale: 'Complex synthesis/judgment task: deterministic checks provide coverage but final quality
    remains reviewer-dependent.'
